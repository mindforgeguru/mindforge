version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mindforge_postgres
    restart: unless-stopped
    environment:
      # Non-secrets (db/user names) keep harmless defaults.
      POSTGRES_DB: ${POSTGRES_DB:-mindforge}
      POSTGRES_USER: ${POSTGRES_USER:-mindforge}
      # Secrets — compose refuses to start if unset. Set in .env on the host.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    # Host port binding only in docker-compose.local.yml — postgres should never
    # be reachable from outside the docker network in a self-hosted prod setup.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mindforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mindforge_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis_data:/data
    # Host port binding only in docker-compose.local.yml.
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mindforge_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # MINIO_ROOT_USER default of "minioadmin" is a well-known credential —
      # require explicit override.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in .env}
    volumes:
      - minio_data:/data
    # Host port binding only in docker-compose.local.yml — the admin console on
    # 9001 is especially dangerous to expose publicly.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mindforge_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-mindforge}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-mindforge}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # No host port mapping in production — nginx is the only ingress.
    # Exposing 8000 on the host bypasses nginx (rate limiting, security
    # headers) and lets a client forge X-Forwarded-For. docker-compose.local.yml
    # re-adds the host binding for local dev where nginx is disabled.

  nginx:
    image: nginx:alpine
    container_name: mindforge_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build/web:/var/www/mindforge_web:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - minio

volumes:
  postgres_data:
  redis_data:
  minio_data:
