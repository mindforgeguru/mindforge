name: mindforge
description: MIND FORGE — AI Assisted Learning Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # HTTP client
  dio: ^5.4.3+1

  # WebSocket
  web_socket_channel: ^3.0.3

  # Charts
  fl_chart: ^0.68.0

  # File handling
  image_picker: ^1.0.7
  file_picker: ^8.0.3

  # Secure storage & preferences
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Image loading
  cached_network_image: ^3.3.1

  # Cryptography — used for SSL certificate fingerprint pinning
  crypto: ^3.0.3

  # PDF printing / sharing
  printing: ^5.14.2

  # Internationalisation / formatting
  intl: ^0.19.0

  # Fonts
  google_fonts: ^8.0.0

  # Icons
  cupertino_icons: ^1.0.8

  # Loading skeletons
  shimmer: ^3.0.0

  # XP level-up celebration
  confetti: ^0.7.0

  # Push notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.1+2

  # Crash + error reporting
  firebase_crashlytics: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/