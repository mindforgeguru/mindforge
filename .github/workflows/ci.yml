name: CI

on:
  push:
    branches: [main, "feature/**", "fix/**", "test/**"]
  pull_request:
    branches: [main]

jobs:
  # ── Backend unit tests (no DB/Redis needed) ──────────────────────────────────
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio

      # Each test file gets its own pytest process. test_logout_handler.py and
      # test_websocket_auth.py install module-level sys.modules stubs that
      # mutate state shared with test_unit.py — keeping them in separate
      # interpreters avoids order-dependent failures (e.g. JWT secret
      # rebinding silently passing a tampered-token assertion). See
      # TEST_RECORD.md §10 if you want to revisit this.
      - name: Run unit tests
        working-directory: backend
        run: python -m pytest tests/test_unit.py -v

      - name: Run logout-handler tests
        working-directory: backend
        run: python -m pytest tests/test_logout_handler.py -v

      - name: Run WebSocket auth tests
        working-directory: backend
        run: python -m pytest tests/test_websocket_auth.py -v

  # ── Dependency vulnerability audit ────────────────────────────────────────────
  dependency-audit:
    name: Python dependency audit (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      # Audits the pinned requirements against the Python advisory DB and fails
      # the build on any known-vulnerable package. If a CVE has no fix yet, add
      # `--ignore-vuln <ID>` here with a comment + tracking link.
      - name: Audit backend dependencies
        run: pip-audit -r backend/requirements.txt --strict

  # ── Flutter unit + widget tests ───────────────────────────────────────────────
  flutter:
    name: Flutter unit & widget tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Get packages
        working-directory: frontend
        run: flutter pub get

      # Warnings are fatal (catches dead code, unused declarations, undefined
      # names, etc. before they land); style infos stay non-fatal.
      - name: Analyze
        working-directory: frontend
        run: flutter analyze --no-fatal-infos

      - name: Unit tests
        working-directory: frontend
        run: flutter test test/unit/ --reporter expanded

      - name: Widget tests
        working-directory: frontend
        run: flutter test test/widget/ --reporter expanded

  # ── API integration tests (manual / scheduled only) ──────────────────────────
  api-integration:
    name: API integration tests (live server)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install httpx pytest

      - name: Run API tests
        env:
          ADMIN_MPIN: ${{ secrets.ADMIN_MPIN }}
        run: python -m pytest tests/test_api.py -v
