worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Don't advertise the nginx version in the Server header or error pages —
    # avoids handing attackers a version to match against known CVEs.
    server_tokens off;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;

    # Gzip compression — reduces API response payload by ~60-70%
    gzip                on;
    gzip_vary           on;          # Add Vary: Accept-Encoding header for CDN/proxy awareness
    gzip_proxied        any;         # Compress responses from upstream (FastAPI)
    gzip_comp_level     6;           # Level 6 = best speed/size balance (1=fast, 9=smallest)
    gzip_min_length     256;         # Don't compress tiny responses (no benefit)
    gzip_buffers        16 8k;
    gzip_types          text/plain text/css application/json application/javascript
                        text/xml application/xml application/xml+rss text/javascript
                        image/svg+xml application/x-font-ttf font/opentype;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # General API: 120 req/min per IP (2/s) — protects all endpoints
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=120r/m;
    # Login: stricter — 5 attempts/min per IP
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
    # Concurrent connections per IP — caps Slowloris / slow-body sockets that
    # request-rate limiting alone does not stop.
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # ── Slow-attack timeouts ──────────────────────────────────────────────────
    # Tighter than nginx's 60s defaults: drop clients that dribble request
    # headers/body or stall on reads (low-and-slow DoS).
    client_header_timeout 15s;
    client_body_timeout   15s;
    send_timeout          30s;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream fastapi_backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Map for WebSocket upgrade headers ─────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # Flutter web app — mindforge.guru
    # HTTP → HTTPS redirect
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name mindforge.guru www.mindforge.guru;
        return 301 https://mindforge.guru$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name mindforge.guru www.mindforge.guru;

        ssl_certificate     /etc/letsencrypt/live/mindforge.guru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mindforge.guru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root /var/www/mindforge_web;
        index index.html;

        # All routes fall back to index.html for Flutter's client-side router
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Cache long-lived hashed assets (Flutter outputs hashed filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        client_max_body_size 10M;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header X-Content-Type-Options    "nosniff"    always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # API server — api.mindforge.guru
    # ═══════════════════════════════════════════════════════════════════════════

    # HTTP → HTTPS redirect. Two exceptions kept on plain HTTP:
    #   • /health         — Docker / load-balancer probes that don't speak TLS.
    #   • /.well-known/acme-challenge/ — certbot http-01 renewal path.
    # Note: do NOT send Strict-Transport-Security from this block — HSTS is
    # defined to be honoured only when received over HTTPS (RFC 6797 §7.2).
    server {
        listen 80;
        server_name api.mindforge.guru;

        location /health {
            return 200 'MIND FORGE nginx OK\n';
            add_header Content-Type text/plain always;
        }

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — the real API ingress.
    server {
        listen 443 ssl;
        server_name api.mindforge.guru;

        # NOTE: if your certbot setup issued a single cert covering both
        # mindforge.guru and api.mindforge.guru (SAN), point both paths
        # below at /etc/letsencrypt/live/mindforge.guru/ instead.
        ssl_certificate     /etc/letsencrypt/live/api.mindforge.guru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.mindforge.guru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 50M;  # Allow large file uploads (PDFs, images)

        # ── Login — rate limited ──────────────────────────────────────────────
        location = /api/auth/login {
            limit_req zone=login_zone burst=3 nodelay;
            limit_req_status 429;

            # Auth payloads are tiny JSON. Cap well below the 50M API default
            # so oversized bodies are rejected at the edge before reaching app
            # validators (defence-in-depth against CPU/memory abuse).
            client_max_body_size 8k;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            # Overwrite (not append) XFF with the real peer IP. Using
            # $proxy_add_x_forwarded_for would preserve any client-supplied
            # X-Forwarded-For, letting a caller spoof the leading value the
            # backend reads for per-IP rate limiting. nginx is the TLS edge,
            # so $remote_addr is the true client.
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── Registration — small JSON body, edge-capped ───────────────────────
        location = /api/auth/register {
            limit_req zone=api_zone burst=30 nodelay;
            limit_req_status 429;

            client_max_body_size 8k;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            # Overwrite (not append) XFF with the real peer IP. Using
            # $proxy_add_x_forwarded_for would preserve any client-supplied
            # X-Forwarded-For, letting a caller spoof the leading value the
            # backend reads for per-IP rate limiting. nginx is the TLS edge,
            # so $remote_addr is the true client.
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;
            limit_req_status 429;

            # Cap concurrent sockets per IP to defeat Slowloris/slow-body while
            # staying well above what a NAT'd classroom of short-lived REST
            # calls needs. WebSockets (/ws/) are intentionally exempt.
            limit_conn conn_zone 100;
            limit_conn_status 429;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            # Overwrite (not append) XFF with the real peer IP. Using
            # $proxy_add_x_forwarded_for would preserve any client-supplied
            # X-Forwarded-For, letting a caller spoof the leading value the
            # backend reads for per-IP rate limiting. nginx is the TLS edge,
            # so $remote_addr is the true client.
            proxy_set_header   X-Forwarded-For   $remote_addr;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts for long-running AI generation requests
            proxy_read_timeout    300s;
            proxy_connect_timeout  60s;
            proxy_send_timeout    300s;
        }

        # ── WebSocket endpoint ────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;

            # Required WebSocket upgrade headers
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            # Overwrite (not append) XFF with the real peer IP. Using
            # $proxy_add_x_forwarded_for would preserve any client-supplied
            # X-Forwarded-For, letting a caller spoof the leading value the
            # backend reads for per-IP rate limiting. nginx is the TLS edge,
            # so $remote_addr is the true client.
            proxy_set_header   X-Forwarded-For   $remote_addr;

            # Keep WebSocket connections alive
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }

        # API docs (/docs, /redoc, /openapi.json) are intentionally NOT
        # proxied. The backend disables them unless APP_ENV=development.
        # If you ever need them on a self-host (e.g. staging), uncomment
        # location blocks here AND set APP_ENV=development on the backend.

        # ── Security headers (applied to all proxy locations) ────────────────
        # Note: headers must be repeated here because any location with its own
        # add_header would otherwise suppress the server-block headers (nginx
        # inheritance rule). Proxy locations have no add_header so they inherit.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "DENY"      always;
        add_header X-Content-Type-Options    "nosniff"   always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'none'" always;
    }
}
