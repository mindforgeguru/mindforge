worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    gzip                on;
    gzip_types          text/plain text/css application/json application/javascript
                        text/xml application/xml application/xml+rss text/javascript;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 5 login attempts per minute per IP; burst of 3 queued before rejection
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream fastapi_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream minio_storage {
        server minio:9000;
        keepalive 16;
    }

    # ── Map for WebSocket upgrade headers ─────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # Main server block
    # ═══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        client_max_body_size 50M;   # Allow large file uploads (PDFs, images)

        # ── Health check (used by Docker / load balancers) ────────────────────
        location /health {
            return 200 'MIND FORGE nginx OK\n';
            add_header Content-Type                      text/plain always;
            add_header Strict-Transport-Security         "max-age=31536000; includeSubDomains" always;
            add_header X-Frame-Options                   "DENY"     always;
            add_header X-Content-Type-Options            "nosniff"  always;
            add_header X-XSS-Protection                  "1; mode=block" always;
            add_header Referrer-Policy                   "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy           "default-src 'none'" always;
        }

        # ── Login — rate limited ──────────────────────────────────────────────
        location = /api/auth/login {
            limit_req zone=login_zone burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── REST API ──────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts for long-running AI generation requests
            proxy_read_timeout    300s;
            proxy_connect_timeout  60s;
            proxy_send_timeout    300s;
        }

        # ── WebSocket endpoint ────────────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;

            # Required WebSocket upgrade headers
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        $connection_upgrade;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Keep WebSocket connections alive
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }

        # ── MinIO / File Storage ──────────────────────────────────────────────
        location /storage/ {
            # Strip /storage prefix before proxying to MinIO
            rewrite ^/storage/(.*)$ /$1 break;

            proxy_pass         http://minio_storage;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            # Buffering settings for file downloads
            proxy_buffering    off;
            proxy_request_buffering off;
        }

        # ── API Docs (Swagger / ReDoc — development only) ─────────────────────
        location /docs {
            proxy_pass         http://fastapi_backend/docs;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        location /openapi.json {
            proxy_pass         http://fastapi_backend/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Security headers (applied to all proxy locations) ────────────────
        # Note: headers must be repeated here because any location with its own
        # add_header would otherwise suppress the server-block headers (nginx
        # inheritance rule). Proxy locations have no add_header so they inherit.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "DENY"      always;
        add_header X-Content-Type-Options    "nosniff"   always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy   "default-src 'none'" always;
    }
}
